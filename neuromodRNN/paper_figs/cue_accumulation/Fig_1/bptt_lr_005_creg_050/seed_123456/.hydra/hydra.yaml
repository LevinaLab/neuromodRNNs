hydra:
  run:
    dir: outputs/${task.task_name}/${save_paths.experiment_name}/${save_paths.condition}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - save_paths.experiment_name=bptt_lr_005_creg_050
    - save_paths.condition=seed_123456
    - net_arch.connectivity_rec_layer=local
    - net_arch.sparse_input=True
    - net_arch.sparse_readout=True
    - net_params.k=0.00
    - train_params.learning_rule=BPTT
    - train_params.lr=0.005
    - train_params.iterations=2000
    - train_params.c_reg=0.050
    - net_params.seed=123456
    - task.seed=123456
    - task.p=0.5
    - task.min_delay=1000
    - task.max_delay=1001
  job:
    name: main
    chdir: null
    override_dirname: net_arch.connectivity_rec_layer=local,net_arch.sparse_input=True,net_arch.sparse_readout=True,net_params.k=0.00,net_params.seed=123456,task.max_delay=1001,task.min_delay=1000,task.p=0.5,task.seed=123456,train_params.c_reg=0.050,train_params.iterations=2000,train_params.learning_rule=BPTT,train_params.lr=0.005
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys:
        - save_paths.experiment_name
        - save_paths.condition
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /mnt/qb/work/martius/mot736/neuromodRNN
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /mnt/qb/work/martius/mot736/neuromodRNN/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /mnt/qb/work/martius/mot736/neuromodRNN/outputs/cue_accumulation/bptt_lr_005_creg_050/seed_123456
    choices:
      task: cue_accumulation
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
