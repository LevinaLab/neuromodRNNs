# @package _global_
experiment_type: alignment
 
# Training is BPTT, regardless of any other experiment-side settings.
net_arch:
  connectivity_rec_layer: sparse
 
train_params:
  learning_rule: BPTT
  c_reg: 0.0
  iterations: 1051
 
alignment:
  comparisons:
    - tag: BPTT
      rule: BPTT
    - tag: eprop
      rule: e_prop_hardcoded
    - tag: diffusion_aligned
      rule: diffusion
      diffusion_mode: aligned
    - tag: diffusion_per_step
      rule: diffusion
      diffusion_mode: shuffled_per_step
    - tag: diffusion_fixed
      rule: diffusion
      diffusion_mode: shuffled_fixed
  interval: 50